<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Предложка для Школьного ТВ</title>
    <style>
        :root {
            --bg: #f5f0eb; --card: #ffffff; --text: #2c2c2c;
            --text-secondary: #7a7a7a; --accent: #5c6bc0; --border: #e0d8d0; --radius: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); display: flex; justify-content: center;
            align-items: center; min-height: 100vh; padding: 20px; color: var(--text);
        }
        .container {
            background: var(--card); border-radius: 20px; padding: 32px 28px;
            width: 100%; max-width: 500px; box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        h1 { text-align: center; font-size: 24px; margin-bottom: 6px; }
        .subtitle { text-align: center; color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px 14px; border: 2px solid var(--border);
            border-radius: var(--radius); font-size: 15px; font-family: inherit;
            outline: none; background: #fafaf8; transition: 0.2s; resize: vertical;
        }
        .form-group textarea { min-height: 100px; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); background: #fff; }
        .form-group input[type="file"] { padding: 10px; }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: var(--radius);
            font-size: 16px; font-weight: 600; cursor: pointer; background: var(--accent);
            color: white; transition: 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .success { display: none; text-align: center; padding: 20px; }
        .success.active { display: block; }
        .success .icon { font-size: 48px; margin-bottom: 12px; }
        .form-container { display: block; }
        .form-container.hidden { display: none; }
        .preview-img {
            max-width: 100%; max-height: 150px; border-radius: 8px;
            margin-top: 8px; display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container" id="formContainer">
            <h1>📺 Предложка для ТВ</h1>
            <p class="subtitle">Заполни форму — админ увидит заявку</p>
            <div class="form-group">
                <label>Твоё имя</label>
                <input type="text" id="name" placeholder="Иван Петров">
            </div>
            <div class="form-group">
                <label>Статус</label>
                <select id="status">
                    <option value="">Выбери...</option>
                    <option value="5 класс">5 класс</option>
                    <option value="6 класс">6 класс</option>
                    <option value="7 класс">7 класс</option>
                    <option value="8 класс">8 класс</option>
                    <option value="9 класс">9 класс</option>
                    <option value="10 класс">10 класс</option>
                    <option value="11 класс">11 класс</option>
                    <option value="Выпускник">Выпускник</option>
                    <option value="Не лицеист">Не лицеист</option>
                </select>
            </div>
            <div class="form-group">
                <label>Текст предложения</label>
                <textarea id="text" placeholder="Я предлагаю сделать рекламу о..."></textarea>
            </div>
            <div class="form-group">
                <label>Картинка (можно прикрепить)</label>
                <input type="file" id="imageInput" accept="image/*" onchange="previewImage()">
                <img id="preview" class="preview-img">
            </div>
            <button class="btn" id="submitBtn" onclick="submitProposal()">📤 Отправить заявку</button>
        </div>

        <div class="success" id="successMessage">
            <div class="icon">✅</div>
            <h2>Заявка отправлена!</h2>
            <p style="color: var(--text-secondary); margin-top: 8px;">Админ увидит её и примет решение</p>
            <button class="btn" style="margin-top: 20px;" onclick="location.reload()">Отправить ещё одну</button>
        </div>
    </div>

    <script>
        const GITHUB_TOKEN = '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';
        const REPO_OWNER = 'Bat0nCH1K';
        const REPO_NAME = 'YourBannerLi7';

        function previewImage() {
            const file = document.getElementById('imageInput').files[0];
            const preview = document.getElementById('preview');
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        async function submitProposal() {
            const name = document.getElementById('name').value.trim();
            const status = document.getElementById('status').value;
            const text = document.getElementById('text').value.trim();
            const imageFile = document.getElementById('imageInput').files[0];
            const btn = document.getElementById('submitBtn');

            if (!name || !status || !text) {
                alert('Заполни все поля');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Отправка...';

            let imageBase64 = '';
            if (imageFile) {
                imageBase64 = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(imageFile);
                });
            }

            const title = `[${status}] ${name} — ${text.slice(0, 50)}${text.length > 50 ? '...' : ''}`;
            let body = `**Имя:** ${name}\n**Статус:** ${status}\n\n**Предложение:**\n${text}`;
            
            if (imageBase64) {
                body += `\n\n![Картинка](${imageBase64})`;
            }
            
            body += `\n\n---\n_Заявка создана через сайт_`;

            try {
                const response = await fetch(`https://corsproxy.io/?url=https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({ title, body })
                });

                if (response.ok) {
                    document.getElementById('formContainer').classList.add('hidden');
                    document.getElementById('successMessage').classList.add('active');
                } else {
                    const err = await response.json();
                    console.error(err);
                    throw new Error('Ошибка GitHub API');
                }
            } catch (error) {
                alert('Ошибка отправки. Попробуй ещё раз.');
                btn.disabled = false;
                btn.textContent = '📤 Отправить заявку';
            }
        }
    </script>
</body>
</html>
