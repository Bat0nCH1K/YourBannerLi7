<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Школьное ТВ — Предложка</title>
    <style>
        :root {
            --bg: #f5f0eb; --card: #ffffff; --text: #2c2c2c;
            --text-secondary: #7a7a7a; --accent: #5c6bc0;
            --border: #e0d8d0; --radius: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); display: flex; justify-content: center;
            min-height: 100vh; padding: 20px; color: var(--text);
        }
        .container {
            background: var(--card); border-radius: 20px; padding: 32px 28px;
            width: 100%; max-width: 500px; box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        h1 { text-align: center; font-size: 24px; margin-bottom: 6px; }
        .subtitle { text-align: center; color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px 14px; border: 2px solid var(--border);
            border-radius: var(--radius); font-size: 15px; font-family: inherit;
            outline: none; background: #fafaf8; resize: vertical;
        }
        .form-group textarea { min-height: 80px; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); background: #fff; }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: var(--radius);
            font-size: 16px; font-weight: 600; cursor: pointer; background: var(--accent); color: white;
        }
        .btn:disabled { opacity: 0.6; }
        .success { display: none; text-align: center; padding: 30px; }
        .success.active { display: block; }
        .form-container.hidden { display: none; }
        .note { text-align: center; color: var(--text-secondary); font-size: 12px; margin-top: 12px; }
        .hint { font-size: 11px; color: #999; margin-top: 4px; }
        .subscribe-block {
            margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border);
            text-align: center;
        }
        .subscribe-btn {
            background: #8774e1; display: inline-block; padding: 10px 20px;
            border-radius: 25px; color: white; text-decoration: none; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container" id="formContainer">
            <h1>📺 Школьное ТВ</h1>
            <p class="subtitle">Предложи свой пост для рекламы</p>
            <div class="form-group"><label>Твоё имя</label><input type="text" id="userName" placeholder="Иван Петров"></div>
            <div class="form-group">
                <label>Telegram username (для ответа)</label>
                <input type="text" id="telegramUser" placeholder="@username">
            </div>
            <div class="form-group"><label>Статус</label>
                <select id="userStatus">
                    <option value="">Выбери...</option>
                    <option value="5 класс">5 класс</option><option value="6 класс">6 класс</option>
                    <option value="7 класс">7 класс</option><option value="8 класс">8 класс</option>
                    <option value="9 класс">9 класс</option><option value="10 класс">10 класс</option>
                    <option value="11 класс">11 класс</option>
                    <option value="Выпускник">Выпускник</option><option value="Не лицеист">Не лицеист</option>
                </select>
            </div>
            <div class="form-group"><label>Текст поста</label><textarea id="postText" placeholder="Опиши свою идею..."></textarea></div>
            <div class="form-group">
                <label>Ссылки на картинки (через запятую)</label>
                <input type="text" id="imageLinks" placeholder="https://i.imgur.com/...">
            </div>
            <div class="form-group"><label>Дата показа</label><input type="date" id="startDate"></div>
            <div class="form-group"><label>Длительность (дней)</label><input type="number" id="duration" value="1" min="1" max="30"></div>
            <button class="btn" id="submitBtn" onclick="sendToTelegram()">📤 Отправить заявку</button>

            <!-- Блок подписки на рассылку (Manybot) -->
            <div class="subscribe-block">
                <p style="font-size:14px;">Хочешь первым узнавать о новых одобренных баннерах?</p>
                <a class="subscribe-btn" href="https://t.me/BannerLi7_bot?start=subscribe" target="_blank">🔔 Подписаться на рассылку</a>
                <div class="hint">Ты получишь уведомление, когда твоя заявка будет одобрена</div>
            </div>
        </div>
        <div class="success" id="successMessage">
            <div style="font-size:48px;">✅</div>
            <h2>Заявка отправлена!</h2>
            <p style="color:var(--text-secondary); margin-top:8px;" id="successText">Админ увидит её и примет решение</p>
            <button class="btn" style="margin-top:20px;" onclick="location.reload()">Отправить ещё одну</button>
        </div>
    </div>
    <script>
        const BOT_TOKEN = '8645752280:AAEi-rfUxaMtVmGaj-7E4fsvfkdVGVRKeFg';
        const CHAT_ID = '6468705214';

        async function sendToTelegram() {
            const name = document.getElementById('userName').value.trim();
            const tgUser = document.getElementById('telegramUser').value.trim();
            const status = document.getElementById('userStatus').value;
            const text = document.getElementById('postText').value.trim();
            const imageLinks = document.getElementById('imageLinks').value.trim();
            const startDate = document.getElementById('startDate').value;
            const duration = parseInt(document.getElementById('duration').value) || 1;
            const btn = document.getElementById('submitBtn');

            if (!name || !status || !text) return alert('Заполни имя, статус и текст');
            if (!startDate) return alert('Выбери дату');
            if (new Date(startDate).getFullYear() > 2030) return alert('Дата слишком далеко');

            btn.disabled = true;
            btn.textContent = 'Отправка...';

            let message = `📺 <b>Новая заявка!</b>\n\n`;
            message += `<b>Имя:</b> ${name}\n`;
            if (tgUser) message += `<b>Telegram:</b> ${tgUser}\n`;
            message += `<b>Статус:</b> ${status}\n`;
            message += `<b>Дата показа:</b> ${startDate}\n`;
            message += `<b>Длительность:</b> ${duration} дн.\n\n`;
            message += `<b>Предложение:</b>\n${text}\n`;
            if (imageLinks) {
                message += `\n<b>🖼 Ссылки на картинки:</b>\n${imageLinks}`;
            }

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'HTML', disable_web_page_preview: false })
                });

                document.getElementById('formContainer').classList.add('hidden');
                const successText = document.getElementById('successText');
                if (tgUser) {
                    successText.textContent = `Админ увидит заявку и ответит тебе в Telegram на ${tgUser}`;
                } else {
                    successText.textContent = 'Админ увидит заявку и примет решение';
                }
                document.getElementById('successMessage').classList.add('active');
            } catch (e) {
                console.error(e);
                alert('Ошибка. Попробуй ещё раз.');
                btn.disabled = false;
                btn.textContent = '📤 Отправить';
            }
        }
    </script>
</body>
</html>
