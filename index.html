<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Школьное ТВ — Предложка</title>
    <style>
        :root {
            --bg: #f5f0eb; --card: #ffffff; --text: #2c2c2c;
            --text-secondary: #7a7a7a; --accent: #5c6bc0;
            --border: #e0d8d0; --radius: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); display: flex; justify-content: center;
            min-height: 100vh; padding: 20px; color: var(--text);
        }
        .container {
            background: var(--card); border-radius: 20px; padding: 32px 28px;
            width: 100%; max-width: 500px; box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        h1 { text-align: center; font-size: 24px; margin-bottom: 6px; }
        .subtitle { text-align: center; color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px 14px; border: 2px solid var(--border);
            border-radius: var(--radius); font-size: 15px; font-family: inherit;
            outline: none; background: #fafaf8; resize: vertical;
        }
        .form-group textarea { min-height: 80px; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); background: #fff; }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: var(--radius);
            font-size: 16px; font-weight: 600; cursor: pointer; background: var(--accent); color: white;
        }
        .btn:disabled { opacity: 0.6; }
        .success { display: none; text-align: center; padding: 30px; }
        .success.active { display: block; }
        .form-container.hidden { display: none; }
        .note { text-align: center; color: var(--text-secondary); font-size: 12px; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container" id="formContainer">
            <h1>📺 Школьное ТВ</h1>
            <p class="subtitle">Предложи свой пост для рекламы</p>
            <div class="form-group"><label>Твоё имя</label><input type="text" id="userName" placeholder="Иван Петров"></div>
            <div class="form-group"><label>Статус</label>
                <select id="userStatus">
                    <option value="">Выбери...</option>
                    <option value="5 класс">5 класс</option><option value="6 класс">6 класс</option>
                    <option value="7 класс">7 класс</option><option value="8 класс">8 класс</option>
                    <option value="9 класс">9 класс</option><option value="10 класс">10 класс</option>
                    <option value="11 класс">11 класс</option>
                    <option value="Выпускник">Выпускник</option><option value="Не лицеист">Не лицеист</option>
                </select>
            </div>
            <div class="form-group"><label>Текст поста</label><textarea id="postText" placeholder="Опиши свою идею..."></textarea></div>
            <div class="form-group"><label>Дата и время показа</label><input type="datetime-local" id="startTime"></div>
            <div class="form-group"><label>Длительность (минут)</label><input type="number" id="duration" value="30" min="1" max="120"></div>
            <button class="btn" id="submitBtn" onclick="sendToTelegram()">📤 Отправить</button>
            <p class="note">Заявка уйдёт админу в Telegram</p>
        </div>
        <div class="success" id="successMessage">
            <div style="font-size:48px;">✅</div>
            <h2>Заявка отправлена!</h2>
            <p style="color:var(--text-secondary); margin-top:8px;">Админ увидит её и примет решение</p>
            <button class="btn" style="margin-top:20px;" onclick="location.reload()">Отправить ещё одну</button>
        </div>
    </div>
    <script>
        const BOT_TOKEN = '8645752280:AAEi-rfUxaMtVmGaj-7E4fsvfkdVGVRKeFg';
        const CHAT_ID = '6468705214';
        async function sendToTelegram() {
            const name = document.getElementById('userName').value.trim();
            const status = document.getElementById('userStatus').value;
            const text = document.getElementById('postText').value.trim();
            const startTime = document.getElementById('startTime').value;
            const duration = document.getElementById('duration').value || 30;
            const btn = document.getElementById('submitBtn');
            if (!name || !status || !text) return alert('Заполни имя, статус и текст');
            if (!startTime) return alert('Выбери дату и время');
            if (new Date(startTime).getFullYear() > 2030) return alert('Дата слишком далеко');
            btn.disabled = true; btn.textContent = 'Отправка...';
            const message = `📺 <b>Новая заявка!</b>\n\n<b>Имя:</b> ${name}\n<b>Статус:</b> ${status}\n<b>Дата показа:</b> ${startTime}\n<b>Длительность:</b> ${duration} мин\n\n<b>Предложение:</b>\n${text}`;
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'HTML' })
                });
                document.getElementById('formContainer').classList.add('hidden');
                document.getElementById('successMessage').classList.add('active');
            } catch (e) { alert('Ошибка. Попробуй ещё раз.'); btn.disabled = false; btn.textContent = '📤 Отправить'; }
        }
    </script>
</body>
</html>
